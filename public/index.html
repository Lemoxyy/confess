<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anonymous Confessions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Anonymous Confession Wall</h1>
        <p>Write your mind. Share anonymously. Everyone reads.</p>
      </header>

      <section class="form-section">
        <textarea
          id="confessionText"
          placeholder="Type your anonymous confession here..."
        ></textarea>
        <button id="submitBtn">Post Confession</button>
      </section>

      <section class="confession-list-section">
        <h2>Latest Confessions</h2>
        <div id="confessions"></div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
